<div class="col-md-6 mb-5 text-center">

<div class="card">
    <div class="front" style="background-image: url('{{ movie.img_url }}');">
        <p class="large">{{ movie.ranking }}</p>
    </div>

    <div class="back">
        <div>
            <div class="title">
                {{ movie.title }}
                <span class="release_date">({{ movie.year }})</span>
            </div>

            <div class="rating">
                <label>{{ movie.rating }}</label>
                <i class="fas fa-star star"></i>
            </div>

            <p class="review">{{ movie.review }}</p>

            <p class="overview">
                {{ movie.description }}
            </p>

            <a href="{{ url_for('rate_movie', id=movie.id) }}" class="button">Update</a>
            <a href="{{ url_for('delete', id=movie.id) }}" class="button delete-button">Delete</a>
        </div>
    </div>
</div>

<h4 style="margin-top:10px;">{{ movie.title }}</h4>

</div>
